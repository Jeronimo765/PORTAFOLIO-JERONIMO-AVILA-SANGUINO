<section id="projects">
    <div class="container">

        <div class="section-header" appScrollAnimation>
            <span class="section-tag">// 03 — projects</span>
            <h2 class="section-title">Lo que he construido</h2>
            <p class="section-desc">
                Proyectos que demuestran mis habilidades en frontend, backend y consumo de APIs.
            </p>
        </div>

        <div class="projects-grid">

            <div class="project-card" *ngFor="let p of projects" appScrollAnimation
                role="link"
                tabindex="0"
                (click)="openProject(p.liveUrl)"
                (keydown.enter)="openProject(p.liveUrl)"
                (keydown.space)="openProject(p.liveUrl); $event.preventDefault()">

                <div class="project-preview"
                    [class.has-image]="p.imageUrl"
                    [style.background]="p.imageUrl ? 'linear-gradient(180deg, #fffdf7 0%, #f3f7ed 100%)' : p.gradient">
                    <span *ngIf="p.featured" class="featured-badge">DESTACADO</span>
                    <img *ngIf="p.imageUrl" class="project-preview-image" [src]="p.imageUrl" [alt]="'Logo de ' + p.title">
                </div>

                <div class="project-body">

                    <div class="project-tags">
                        <span *ngFor="let tag of p.tags" class="project-tag" [ngClass]="getTagClass(tag.type)">
                            {{ tag.label }}
                        </span>
                    </div>

                    <h3 class="project-title">{{ p.title }}</h3>
                    <p class="project-desc">{{ p.description }}</p>

                    <div class="project-links">
                        <a [href]="p.githubUrl" class="link-btn" target="_blank" rel="noopener noreferrer"
                            (click)="$event.stopPropagation()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0
                         00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44
                         0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16
                         2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09
                         1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5
                         3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009
                         18.13V22" />
                            </svg>
                            GitHub
                        </a>
                        <a [href]="p.liveUrl" class="link-btn live" target="_blank" rel="noopener noreferrer"
                            (click)="$event.stopPropagation()">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
                                viewBox="0 0 24 24">
                                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
                                <polyline points="15 3 21 3 21 9" />
                                <line x1="10" y1="14" x2="21" y2="3" />
                            </svg>
                            Ver proyecto
                        </a>
                    </div>

                </div>
            </div>

        </div>

    </div>
</section>
